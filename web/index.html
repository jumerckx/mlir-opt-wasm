<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>mlir-opt web</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    .controls { display: flex; gap: 0.5rem; align-items: center; margin: 0.5rem 0; }
    .controls input { flex: 1; font-family: ui-monospace, monospace; padding: 0.3rem; }
    /* Looks like the start of a shell command so the args field reads as its
       continuation. Muted + non-selectable so it doesn't invite editing. */
    .cmd-prefix {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9rem;
      color: rgba(127,127,127,0.85);
      user-select: none;
      white-space: nowrap;
    }
    /* `minmax(0, 1fr)` instead of `1fr`: the default `1fr` min is `auto`, so
       wide non-wrapping code would stretch the column. Clamping the min to 0
       keeps the panes a fixed width and lets the editor scroll horizontally. */
    .row { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 1rem; }

    pre#log {
      background: rgba(127,127,127,0.1);
      padding: 0.5rem;
      height: 10rem;
      overflow: auto;
      margin: 0;
      font-family: ui-monospace, monospace;
      white-space: pre-wrap;
    }
  </style>

  <!-- CodeMirror is bundled into this page's content-hashed script by esbuild
       (see web/build.mjs). No runtime CDN dependency. -->

</head>
<body>
  <h1>mlir-opt web</h1>
  <nav class="pages">
    <a href="./index.html" aria-current="page">mlir-opt</a> ·
    <a href="./pdl.html">PDL → pdl_interp lowering</a>
  </nav>
  <p id="status">Loading mlir-opt.wasm…</p>
  <div class="controls">
    <span class="cmd-prefix">mlir-opt</span>
    <input id="args" value="--canonicalize">
    <button id="run" disabled>Run</button>
  </div>
  <div class="row">
    <div>
      <h2>Input MLIR</h2>
      <div class="editor" id="input-editor"></div>
      <pre class="err" id="input-err"></pre>
    </div>
    <div>
      <h2>Output</h2>
      <div class="editor" id="output-editor"></div>
      <pre class="err" id="output-err"></pre>
    </div>
  </div>
  <h2>Log</h2>
  <pre id="log"></pre>
  <script type="module" src="./app.js"></script>
</body>
</html>
